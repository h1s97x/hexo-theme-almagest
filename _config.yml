# Hexo Theme Almagest Configuration
# ==================================
# 星空主题配置 - 专为天文爱好者设计的优雅博客主题

# ============================================================
# 基础配置 (Basic Configuration)
# ============================================================

# 主题名称
title: "H1S97X"

# 副标题
subtitle: "技术分享与生活记录 | 或有月下赏花人 应无所憾"

# 网站描述
description: "专注于技术开发、系统运维、游戏世界和学术学习的个人博客"

# 作者名称
author: "H1S97X"

# 网站语言
language: zh-CN

# ============================================================
# 样式配置 (Style Configuration)
# ============================================================

style:
  # 主题色 (星空蓝)
  primary_color: "#4a90d9"
  
  # 强调色 (星青色)
  accent_color: "#06b6d4"
  
  # 主题偏好: auto | light | dark
  # auto: 根据系统设置自动切换
  # light: 始终使用亮色主题
  # dark: 始终使用暗色主题
  prefers_theme: "dark"
  
  # 启用星空背景效果 (仅暗色主题)
  enable_starry_background: true
  
  # 启用平滑过渡
  smooth_transition: true
  
  # 代码块主题: atom-one-light | atom-one-dark | github | monokai
  code_theme: "atom-one-dark"

# ============================================================
# 导航菜单配置 (Navigation Menu)
# ============================================================

menu:
  首页: /
  归档: /blog/archives/
  分类: /blog/categories/
  标签: /blog/tags/
  关于: /about/

# ============================================================
# 侧边栏配置 (Sidebar Configuration)
# ============================================================

sidebar:
  # 是否启用侧边栏
  enable: true
  
  # 侧边栏位置: left | right
  position: right
  
  # 侧边栏宽度 (像素)
  width: 280
  
  # 侧边栏组件
  widgets:
    - about
    - recent-posts
    - categories
    - tags

# ============================================================
# 功能开关 (Feature Toggles)
# ============================================================

features:
  # 搜索功能
  search: true
  
  # 评论系统
  comments: true
  
  # 目录 (Table of Contents)
  toc: true
  
  # 代码复制按钮
  code_copy: true
  
  # 返回顶部按钮
  back_to_top: true
  
  # 阅读时间估计
  reading_time: true
  
  # 文章字数统计
  word_count: true
  
  # Pjax 无刷新导航
  # 启用后页面切换将使用无刷新加载，提升体验
  pjax: true
  
  # 阅读模式
  # 一键切换到专注阅读的干净界面
  reading_mode: true

# ============================================================
# 社交链接 (Social Links)
# ============================================================

social:
  # GitHub
  github: "https://github.com/h1s97x"
  
  # Twitter
  twitter: ""
  
  # 微博
  weibo: ""
  
  # 知乎
  zhihu: ""
  
  # 邮箱
  email: ""

# ============================================================
# 第三方服务 (Third-party Services)
# ============================================================

services:
  # Giscus 评论系统
  giscus:
    enable: false
    repo: ""
    repo_id: ""
    category: "Announcements"
    category_id: ""
    mapping: "pathname"
    reactions_enabled: true
    emit_metadata: false
    input_position: "bottom"
    theme: "dark"
    lang: "zh-CN"
    loading: "lazy"
  
  # Google Analytics
  google_analytics:
    enable: false
    tracking_id: ""
  
  # 百度统计
  baidu_analytics:
    enable: false
    tracking_id: ""

# ============================================================
# 分页配置 (Pagination Configuration)
# ============================================================

pagination:
  # 每页文章数
  per_page: 8
  
  # 分页类型: pagination | infinite
  type: "pagination"

# ============================================================
# 文章配置 (Article Configuration)
# ============================================================

article:
  # 文章摘要长度 (字符数)
  excerpt_length: 200
  
  # 是否显示文章更新时间
  show_updated: true
  
  # 是否显示阅读时间
  show_reading_time: true
  
  # 是否显示字数统计
  show_word_count: true
  
  # 日期格式
  date_format: "YYYY-MM-DD"

# ============================================================
# 图片配置 (Image Configuration)
# ============================================================

image:
  # 启用图片懒加载
  lazy_load: true
  
  # 图片占位符颜色
  placeholder_color: "#1a1a2e"
  
  # 默认文章封面 (留空则不显示)
  default_cover: ""
  
  # 图片灯箱
  # 点击文章中的图片可放大查看
  lightbox: true

# ============================================================
# 天文主题配置 (Astronomy Theme Configuration)
# ============================================================

astronomy:
  # 启用天文主题组件
  enable: true
  
  # 星星动画速度: slow | normal | fast
  animation_speed: "normal"
  
  # 显示星座导航
  show_constellation_nav: false
  
  # 显示天文日历
  show_astronomy_calendar: false

# ============================================================
# 自定义注入 (Custom Injection)
# ============================================================

# 在 <head> 中注入自定义代码
inject:
  head: |
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  # 在 </body> 前注入自定义代码
  body_end: ""

# ============================================================
# RSS 配置 (RSS Configuration)
# ============================================================

rss:
  # 是否启用 RSS
  enable: true
  
  # RSS 路径
  path: "atom.xml"
  
  # RSS 标题
  title: ""
  
  # RSS 描述
  description: ""
  
  # RSS 作者
  author: ""

# ============================================================
# 友链配置 (Friends Links Configuration)
# ============================================================

friends:
  # 是否启用友链功能
  enable: false
  
  # 友链页面标题
  title: "友情链接"
  
  # 友链列表
  links:
    # 示例:
    # - name: "博客名称"
    #   url: "https://example.com"
    #   avatar: "https://example.com/avatar.png"
    #   description: "博客描述"

# ============================================================
# SEO 配置 (SEO Configuration)
# ============================================================

seo:
  # 是否启用 SEO 优化
  enable: true
  
  # Google SEO
  google:
    # Google 站点验证
    site_verification: ""
    
    # Google Analytics 追踪 ID
    tracking_id: ""
  
  # 百度 SEO
  baidu:
    # 百度站点验证
    site_verification: ""
    
    # 百度统计追踪 ID
    tracking_id: ""
  
  # Open Graph
  open_graph:
    enable: true
    twitter_card: true
    twitter_id: ""
    twitter_site: ""
  
  # 优先级设置
  priority:
    homepage: 1.0
    post: 0.8
    page: 0.6
    archive: 0.5
    category: 0.4
    tag: 0.4

# ============================================================
# 文章目录配置 (Table of Contents Configuration)
# ============================================================

toc:
  # 是否启用文章目录
  enable: true
  
  # 目录位置: left | right
  position: "right"
  
  # 目录宽度 (像素)
  width: 260
  
  # 是否在移动端显示
  mobile: false
  
  # 是否自动编号
  list_number: true
  
  # 目录标题
  title: "目录"
  
  # 最小深度 (h2-h6)
  min_depth: 2
  
  # 最大深度 (h2-h6)
  max_depth: 6
  
  # 是否折叠
  collapse: false

# ============================================================
# 阅读进度条配置 (Reading Progress Configuration)
# ============================================================

reading_progress:
  # 是否启用阅读进度条
  enable: true
  
  # 进度条位置: top | bottom
  position: "top"
  
  # 进度条高度 (像素)
  height: 3
  
  # 进度条颜色
  color: "#4a90d9"
  
  # 是否显示百分比
  show_percent: false

# ============================================================
# 代码高亮配置 (Code Highlight Configuration)
# ============================================================

highlight:
  # 是否启用代码高亮
  enable: true
  
  # 代码高亮主题
  theme: "atom-one-dark"
  
  # 可用主题:
  # - atom-one-light, atom-one-dark
  # - github, github-dark
  # - monokai, monokai-sublime
  # - dracula, nord, one-dark-pro
  # - vs, vs2015, xcode
  
  # 是否显示行号
  line_number: true
  
  # 是否启用代码复制
  copy_button: true
  
  # 复制按钮样式: flat | hover
  copy_style: "hover"
  
  # 代码块语言标签
  show_lang: true

# ============================================================
# 数学公式配置 (Math Configuration)
# ============================================================

math:
  # 是否启用数学公式支持
  enable: false
  
  # 公式渲染引擎: mathjax | katex
  engine: "mathjax"
  
  # 是否在首页/归档页渲染公式
  render_on_all_pages: false

# ============================================================
# 高级配置 (Advanced Configuration)
# ============================================================

# 启用调试模式
debug: false

# 自定义 CDN 前缀
cdn_prefix: ""

# 资源版本号 (用于缓存清除)
version: "1.0.0"

# 自定义 CSS 类
custom_css_class: ""

# 是否启用平滑滚动
smooth_scroll: true

# 文章特色图片
feature:
  # 是否启用特色图片
  enable: true
  # 默认占位图
  placeholder: ""

# 图片灯箱配置
fancybox:
  enable: true
  auto_hook: true
