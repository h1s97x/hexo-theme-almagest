# Hexo Theme Almagest Configuration
# ==================================
# 星空主题配置 - 专为天文爱好者设计的优雅博客主题

# ============================================================
# 基础配置 (Basic Configuration)
# ============================================================

# 主题名称
title: "H1S97X"

# 副标题
subtitle: "技术分享与生活记录 | 或有月下赏花人 应无所憾"

# 网站描述
description: "专注于技术开发、系统运维、游戏世界和学术学习的个人博客"

# 作者名称
author: "H1S97X"

# 网站语言
language: zh-CN

# ============================================================
# 样式配置 (Style Configuration)
# ============================================================

style:
  # 主题色 (星空蓝)
  primary_color: "#4a90d9"
  
  # 强调色 (星青色)
  accent_color: "#06b6d4"
  
  # 主题偏好: auto | light | dark
  # auto: 根据系统设置自动切换
  # light: 始终使用亮色主题
  # dark: 始终使用暗色主题
  prefers_theme: "dark"
  
  # 启用星空背景效果 (仅暗色主题)
  enable_starry_background: true
  
  # 启用平滑过渡
  smooth_transition: true
  
  # 代码块主题: atom-one-light | atom-one-dark | github | monokai
  code_theme: "atom-one-dark"

# ============================================================
# 导航菜单配置 (Navigation Menu)
# ============================================================

menu:
  首页: /
  归档: /blog/archives/
  分类: /blog/categories/
  标签: /blog/tags/
  关于: /about/

# ============================================================
# 侧边栏配置 (Sidebar Configuration)
# ============================================================

sidebar:
  # 是否启用侧边栏
  enable: true
  
  # 侧边栏位置: left | right
  position: right
  
  # 侧边栏宽度 (像素)
  width: 280
  
  # 侧边栏组件
  widgets:
    - about
    - recent-posts
    - categories
    - tags

# ============================================================
# 功能开关 (Feature Toggles)
# ============================================================

features:
  # 搜索功能
  search: true
  
  # 评论系统
  comments: true
  
  # 目录 (Table of Contents)
  toc: true
  
  # 代码复制按钮
  code_copy: true
  
  # 返回顶部按钮
  back_to_top: true
  
  # 阅读时间估计
  reading_time: true
  
  # 文章字数统计
  word_count: true

# ============================================================
# 社交链接 (Social Links)
# ============================================================

social:
  # GitHub
  github: "https://github.com/h1s97x"
  
  # Twitter
  twitter: ""
  
  # 微博
  weibo: ""
  
  # 知乎
  zhihu: ""
  
  # 邮箱
  email: ""

# ============================================================
# 第三方服务 (Third-party Services)
# ============================================================

services:
  # Giscus 评论系统
  giscus:
    enable: false
    repo: ""
    repo_id: ""
    category: "Announcements"
    category_id: ""
    mapping: "pathname"
    reactions_enabled: true
    emit_metadata: false
    input_position: "bottom"
    theme: "dark"
    lang: "zh-CN"
    loading: "lazy"
  
  # Google Analytics
  google_analytics:
    enable: false
    tracking_id: ""
  
  # 百度统计
  baidu_analytics:
    enable: false
    tracking_id: ""

# ============================================================
# 分页配置 (Pagination Configuration)
# ============================================================

pagination:
  # 每页文章数
  per_page: 8
  
  # 分页类型: pagination | infinite
  type: "pagination"

# ============================================================
# 文章配置 (Article Configuration)
# ============================================================

article:
  # 文章摘要长度 (字符数)
  excerpt_length: 200
  
  # 是否显示文章更新时间
  show_updated: true
  
  # 是否显示阅读时间
  show_reading_time: true
  
  # 是否显示字数统计
  show_word_count: true
  
  # 日期格式
  date_format: "YYYY-MM-DD"

# ============================================================
# 图片配置 (Image Configuration)
# ============================================================

image:
  # 启用图片懒加载
  lazy_load: true
  
  # 图片占位符颜色
  placeholder_color: "#1a1a2e"
  
  # 默认文章封面 (留空则不显示)
  default_cover: ""

# ============================================================
# 天文主题配置 (Astronomy Theme Configuration)
# ============================================================

astronomy:
  # 启用天文主题组件
  enable: true
  
  # 星星动画速度: slow | normal | fast
  animation_speed: "normal"
  
  # 显示星座导航
  show_constellation_nav: false
  
  # 显示天文日历
  show_astronomy_calendar: false

# ============================================================
# 自定义注入 (Custom Injection)
# ============================================================

# 在 <head> 中注入自定义代码
inject:
  head: |
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  # 在 </body> 前注入自定义代码
  body_end: ""

# ============================================================
# 高级配置 (Advanced Configuration)
# ============================================================

# 启用调试模式
debug: false

# 自定义 CDN 前缀
cdn_prefix: ""

# 资源版本号 (用于缓存清除)
version: "1.0.0"
