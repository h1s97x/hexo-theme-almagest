# Hexo Theme Minimal Pro Configuration

# ============================================================
# 基础配置
# ============================================================

# 主题名称
title: "My Blog"

# 副标题
subtitle: "A minimal and elegant theme"

# 网站描述
description: "Personal blog powered by Hexo and Minimal Pro Theme"

# 作者名称
author: "Your Name"

# 网站语言
language: en

# ============================================================
# 样式配置
# ============================================================

style:
  # 主题色 (十六进制颜色码)
  primary_color: "#0066cc"
  
  # 主题偏好: auto | light | dark
  # auto: 根据系统设置自动切换
  # light: 始终使用亮色主题
  # dark: 始终使用暗色主题
  prefers_theme: "auto"
  
  # 启用平滑过渡
  smooth_transition: true
  
  # 代码块主题: atom-one-light | atom-one-dark | github | monokai
  code_theme: "atom-one-light"

# ============================================================
# 导航菜单配置
# ============================================================

menu:
  Home: /
  Archives: /archives/
  Categories: /categories/
  Tags: /tags/
  About: /about/

# ============================================================
# 侧边栏配置
# ============================================================

sidebar:
  # 是否启用侧边栏
  enable: true
  
  # 侧边栏位置: left | right
  position: right
  
  # 侧边栏宽度 (像素)
  width: 300

# ============================================================
# 功能开关
# ============================================================

features:
  # 搜索功能
  search: true
  
  # 评论系统
  comments: true
  
  # 目录 (Table of Contents)
  toc: true
  
  # 代码复制按钮
  code_copy: true
  
  # 返回顶部按钮
  back_to_top: true
  
  # 阅读时间估计
  reading_time: true

# ============================================================
# 社交链接
# ============================================================

social:
  # GitHub
  github: ""
  
  # Twitter
  twitter: ""
  
  # 微博
  weibo: ""
  
  # 知乎
  zhihu: ""
  
  # 邮箱
  email: ""

# ============================================================
# 第三方服务
# ============================================================

services:
  # Giscus 评论系统
  giscus:
    enable: false
    repo: ""
    repo_id: ""
    category: "Announcements"
    category_id: ""
    mapping: "pathname"
    reactions_enabled: true
    emit_metadata: false
    input_position: "bottom"
    theme: "light"
    lang: "en"
    loading: "lazy"
  
  # Google Analytics
  google_analytics:
    enable: false
    tracking_id: ""
  
  # 百度统计
  baidu_analytics:
    enable: false
    tracking_id: ""

# ============================================================
# 分页配置
# ============================================================

pagination:
  # 每页文章数
  per_page: 10
  
  # 分页类型: pagination | infinite
  type: "pagination"

# ============================================================
# 文章配置
# ============================================================

article:
  # 文章摘要长度 (字符数)
  excerpt_length: 200
  
  # 是否显示文章更新时间
  show_updated: true
  
  # 是否显示阅读时间
  show_reading_time: true

# ============================================================
# 图片配置
# ============================================================

image:
  # 启用图片懒加载
  lazy_load: true
  
  # 图片占位符颜色
  placeholder_color: "#f0f0f0"

# ============================================================
# 自定义注入
# ============================================================

# 在 <head> 中注入自定义代码
inject:
  head: ""
  
  # 在 </body> 前注入自定义代码
  body_end: ""

# ============================================================
# 高级配置
# ============================================================

# 启用调试模式
debug: false

# 自定义 CDN 前缀
cdn_prefix: ""

# 资源版本号 (用于缓存清除)
version: "0.1.0"
