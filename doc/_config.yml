# Hexo Configuration for Demo Blog
# ================================

# Site
title: Hexo Theme Almagest Demo
subtitle: A minimal and elegant Hexo theme
description: Demonstration blog for Hexo Theme Almagest
author: Almagest Team
language: en
timezone: UTC

# URL
url: http://example.com
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
  lang: en

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  open_in_new: true
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: '  '
  wrap: true
  hljs: false
prismjs:
  enable: false

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
plugins:
  - hexo-renderer-ejs
  - hexo-renderer-stylus
  - hexo-renderer-marked
  - hexo-generator-index
  - hexo-generator-archive
  - hexo-generator-category
  - hexo-generator-tag

# Theme
theme: almagest

# Deployment
deploy:
  type: ''
